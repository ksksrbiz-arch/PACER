version: "3.9"

# Production compose file for PACER.
# Use with:  docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pacer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pacer}
      POSTGRES_DB: ${POSTGRES_DB:-pacer}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacer"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata_prod:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      ENVIRONMENT: production
    volumes:
      - ./logs:/app/logs
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata_prod:
  redisdata_prod:
